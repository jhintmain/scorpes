services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: scorpes
      POSTGRES_PASSWORD: scorpes
      POSTGRES_DB: scorpes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorpes -d scorpes_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-dev:
    build:
      context: .
      target: development
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8090
      DATABASE_URL: postgres://scorpes:scorpes@postgres:5432/scorpes_dev?sslmode=disable
    volumes:
      - .:/app
      - go-cache:/go/pkg/mod
    ports:
      - "8090:8090"

volumes:
  go-cache:
  postgres-data:
